[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# 경고 무시 설정
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# 출력 설정
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
